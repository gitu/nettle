name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - name: macOS (Intel)
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - name: Linux (x86_64)
            platform: ubuntu-22.04
            args: ''
          - name: Windows (x86_64)
            platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Build and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'nettle ${{ github.ref_name }}'
          releaseBody: |
            Resilient SSH client with live port discovery, pinned tunnels,
            dual-pane SFTP, and a built-in terminal.

            Downloads below: `.dmg` (macOS), `.AppImage`/`.deb`/`.rpm` (Linux),
            `.msi`/`.exe` (Windows). Builds are unsigned — see the README for
            platform notes on first launch.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
