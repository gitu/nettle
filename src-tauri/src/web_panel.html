<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>nettle remote</title>
<style>
  /* Theme from CSS system colours only — follows the viewing device's
     light/dark appearance and accent colour. */
  :root {
    color-scheme: light dark;
    --on: CanvasText;
    --bg: Canvas;
    --head: color-mix(in srgb, Canvas 95%, var(--on));
    --panel: color-mix(in srgb, Canvas 93%, var(--on));
    --border: color-mix(in srgb, var(--on) 12%, transparent);
    --text: CanvasText;
    --muted: GrayText;
    --acc: AccentColor;
    --acc-fg: AccentColorText;
    --ok: light-dark(#1a8a4f, #4ade80);
    --err: light-dark(#d23b40, #f0a0a0);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5; background: var(--head);
    border-bottom: 1px solid var(--border); padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    padding-top: max(12px, env(safe-area-inset-top));
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--acc); flex: none; }
  header b { font-weight: 600; letter-spacing: .02em; }
  header .sp { flex: 1; }
  main { padding: 12px 14px 40px; max-width: 760px; margin: 0 auto; }
  .muted { color: var(--muted); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; margin: 10px 0; overflow: hidden; }
  .row { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border-top: 1px solid var(--border); }
  .row:first-child { border-top: none; }
  .row .grow { flex: 1; min-width: 0; }
  .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sub { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); flex: none; }
  .pill.on { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 45%, transparent); }
  button {
    font: inherit; color: var(--text); background: transparent;
    border: 1px solid color-mix(in srgb, var(--on) 22%, transparent); border-radius: 7px; padding: 7px 12px;
    cursor: pointer; flex: none;
  }
  button:hover { border-color: color-mix(in srgb, var(--acc) 60%, transparent); }
  button.acc { background: var(--acc); color: var(--acc-fg); border-color: transparent; font-weight: 600; }
  button.sm { padding: 5px 9px; font-size: 12px; }
  a.dl { color: var(--acc); text-decoration: none; border: 1px solid var(--border); border-radius: 7px; padding: 5px 9px; font-size: 12px; flex: none; }
  a.dl:hover { border-color: color-mix(in srgb, var(--acc) 60%, transparent); }
  .crumbs { display: flex; flex-wrap: wrap; gap: 4px; font-size: 12px; padding: 10px 13px; color: var(--muted); }
  .crumbs button { border: none; padding: 0; color: var(--acc); background: none; }
  .crumbs button:hover { text-decoration: underline; }
  .ftag { font-size: 10px; color: var(--muted); width: 30px; flex: none; text-transform: uppercase; }
  .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 90%; }
  .toast.show { opacity: 1; }
  .toast.err { border-color: color-mix(in srgb, var(--err) 55%, transparent); color: var(--err); }
  .empty { color: var(--muted); padding: 18px 13px; text-align: center; font-size: 13px; }
  .hidden { display: none; }
  .back { color: var(--acc); background: none; border: none; padding: 0; font: inherit; cursor: pointer; }
</style>
</head>
<body>
<header>
  <span class="dot"></span><b>nettle</b>
  <span class="muted" id="subtitle">remote control</span>
  <span class="sp"></span>
  <button class="sm hidden" id="refresh">refresh</button>
</header>
<main>
  <div id="need-token" class="card hidden"><div class="empty">
    No access token in the link. Open the link generated by nettle (it ends with <code>#t=…</code>).
  </div></div>
  <div id="hosts-view"></div>
  <div id="files-view" class="hidden">
    <div class="row" style="padding:0 0 4px 0; border:none;">
      <button class="back" id="files-back">← hosts</button>
    </div>
    <div class="card">
      <div class="crumbs" id="crumbs"></div>
    </div>
    <div class="row" style="border:none; padding:6px 0;">
      <input type="file" id="file-input" class="hidden" />
      <button class="acc sm" id="upload-btn">↑ upload here</button>
      <span class="sp" style="flex:1"></span>
    </div>
    <div class="card" id="entries"></div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
const token = new URLSearchParams(location.hash.slice(1)).get('t') || '';
const $ = (id) => document.getElementById(id);
let current = { hostId: null, path: null, hostName: '' };

function toast(msg, isErr) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => (t.className = 'toast'), 2600);
}

async function api(path, opts = {}) {
  const headers = Object.assign({ Authorization: 'Bearer ' + token }, opts.headers || {});
  const res = await fetch('/api' + path, Object.assign({}, opts, { headers }));
  if (res.status === 401) throw new Error('unauthorized — bad or missing token');
  if (!res.ok) {
    let msg = res.status + '';
    try { msg = (await res.json()).error || msg; } catch {}
    throw new Error(msg);
  }
  return res.status === 204 ? null : res.json();
}

function fmtState(conn) {
  return conn && conn.state ? conn.state : 'disconnected';
}

async function loadHosts() {
  $('files-view').classList.add('hidden');
  $('hosts-view').classList.remove('hidden');
  $('subtitle').textContent = 'hosts';
  try {
    const { hosts, sessions } = await api('/state');
    const byId = {};
    for (const s of sessions) byId[s.hostId] = fmtState(s.conn);
    const view = $('hosts-view');
    if (!hosts.length) { view.innerHTML = '<div class="card"><div class="empty">No hosts configured in nettle yet.</div></div>'; return; }
    const card = document.createElement('div');
    card.className = 'card';
    for (const h of hosts) {
      const st = byId[h.id] || 'disconnected';
      const on = st === 'connected';
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML =
        `<div class="grow"><div class="name"></div><div class="sub"></div></div>` +
        `<span class="pill ${on ? 'on' : ''}">${st}</span>`;
      row.querySelector('.name').textContent = h.name;
      row.querySelector('.sub').textContent = `${h.username}@${h.hostname}:${h.port}`;
      const btn = document.createElement('button');
      btn.className = 'sm' + (on ? '' : ' acc');
      btn.textContent = on ? 'files' : 'connect';
      btn.onclick = async () => {
        try {
          if (!on) { toast('connecting…'); await api('/connect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hostId: h.id }) }); }
          openFiles(h.id, h.name);
        } catch (e) { toast(e.message, true); }
      };
      row.appendChild(btn);
      if (on) {
        const dc = document.createElement('button');
        dc.className = 'sm';
        dc.textContent = 'disconnect';
        dc.onclick = async () => { try { await api('/disconnect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hostId: h.id }) }); loadHosts(); } catch (e) { toast(e.message, true); } };
        row.appendChild(dc);
      }
      card.appendChild(row);
    }
    view.innerHTML = '';
    view.appendChild(card);
  } catch (e) { toast(e.message, true); }
}

async function openFiles(hostId, name, path) {
  current.hostId = hostId;
  current.hostName = name;
  $('hosts-view').classList.add('hidden');
  $('files-view').classList.remove('hidden');
  $('subtitle').textContent = name;
  try {
    const listing = await api(`/fs?hostId=${encodeURIComponent(hostId)}&path=${encodeURIComponent(path || '~')}`);
    current.path = listing.path;
    renderCrumbs(listing.path);
    renderEntries(listing);
  } catch (e) { toast(e.message, true); }
}

function renderCrumbs(path) {
  const parts = path.split('/').filter(Boolean);
  const c = $('crumbs');
  c.innerHTML = '';
  const root = document.createElement('button');
  root.textContent = '/';
  root.onclick = () => openFiles(current.hostId, current.hostName, '/');
  c.appendChild(root);
  let acc = '';
  parts.forEach((p) => {
    acc += '/' + p;
    const b = document.createElement('button');
    b.textContent = p + ' ';
    const target = acc;
    b.onclick = () => openFiles(current.hostId, current.hostName, target);
    c.appendChild(document.createTextNode(' '));
    c.appendChild(b);
  });
}

function join(dir, name) { return dir.endsWith('/') ? dir + name : dir + '/' + name; }

function renderEntries(listing) {
  const box = $('entries');
  box.innerHTML = '';
  if (!listing.entries.length) { box.innerHTML = '<div class="empty">Empty directory.</div>'; return; }
  for (const f of listing.entries) {
    const isDir = f.kind === 'dir';
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span class="ftag">${isDir ? 'dir' : (f.kind === 'link' ? 'lnk' : '')}</span><div class="grow"><div class="name"></div></div>`;
    row.querySelector('.name').textContent = isDir ? f.name + '/' : f.name;
    if (isDir) {
      row.style.cursor = 'pointer';
      row.onclick = () => openFiles(current.hostId, current.hostName, join(listing.path, f.name));
    } else {
      const dl = document.createElement('a');
      dl.className = 'dl';
      dl.textContent = '↓';
      dl.href = `/api/download?hostId=${encodeURIComponent(current.hostId)}&path=${encodeURIComponent(join(listing.path, f.name))}&t=${encodeURIComponent(token)}`;
      row.appendChild(dl);
    }
    box.appendChild(row);
  }
}

$('files-back').onclick = loadHosts;
$('refresh').onclick = () => (current.hostId && !$('files-view').classList.contains('hidden')) ? openFiles(current.hostId, current.hostName, current.path) : loadHosts();
$('upload-btn').onclick = () => $('file-input').click();
$('file-input').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    toast('uploading ' + file.name + '…');
    await api(`/upload?hostId=${encodeURIComponent(current.hostId)}&path=${encodeURIComponent(join(current.path, file.name))}`, {
      method: 'POST', headers: { 'Content-Type': 'application/octet-stream' }, body: file,
    });
    toast('uploaded ' + file.name);
    openFiles(current.hostId, current.hostName, current.path);
  } catch (err) { toast(err.message, true); }
  e.target.value = '';
};

if (!token) {
  $('need-token').classList.remove('hidden');
} else {
  $('refresh').classList.remove('hidden');
  loadHosts();
}
</script>
</body>
</html>
