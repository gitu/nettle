name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - name: macOS (Intel)
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - name: Linux (x86_64)
            platform: ubuntu-22.04
            args: ''
          - name: Windows (x86_64)
            platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      # The release tag is the single source of truth for the version: inject it
      # into tauri.conf.json (overrides Cargo.toml for bundle names, the updater,
      # and app.getVersion()). The version fields committed on main are only used
      # by local dev builds.
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' is not a vX.Y.Z release tag" >&2
            exit 1
          fi
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Building nettle $VERSION"

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      # macOS code signing + notarization: the tauri CLI treats even an EMPTY
      # APPLE_CERTIFICATE env var as "signing configured", so only export the
      # variables when the secrets actually exist. See README "Signing macOS builds".
      - name: Enable macOS signing when secrets are configured
        if: matrix.platform == 'macos-latest'
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            {
              echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
              echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
              echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
            echo "macOS signing enabled"
          else
            echo "APPLE_CERTIFICATE secret not set — building unsigned"
          fi

      - name: Build and attach to release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'nettle ${{ github.ref_name }}'
          releaseBody: |
            Resilient SSH client with live port discovery, pinned tunnels,
            dual-pane SFTP, and a built-in terminal.

            Downloads below: `.dmg` (macOS), `.AppImage`/`.deb`/`.rpm` (Linux),
            `.msi`/`.exe` (Windows). Builds are unsigned — see the README for
            platform notes on first launch.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  homebrew:
    name: Update Homebrew cask
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: token
        run: echo "have=${{ secrets.HOMEBREW_TAP_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Compute DMG checksums
        if: steps.token.outputs.have == 'true'
        id: sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release download "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY" -p '*.dmg'
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arm=$(sha256sum nettle_${VERSION}_aarch64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel=$(sha256sum nettle_${VERSION}_x64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        if: steps.token.outputs.have == 'true'
        uses: actions/checkout@v7
        with:
          repository: gitu/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Bump cask
        if: steps.token.outputs.have == 'true'
        run: |
          cd tap
          sed -i \
            -e 's/^  version ".*"$/  version "${{ steps.sums.outputs.version }}"/' \
            -e 's/^  sha256 arm:   ".*",$/  sha256 arm:   "${{ steps.sums.outputs.arm }}",/' \
            -e 's/^         intel: ".*"$/         intel: "${{ steps.sums.outputs.intel }}"/' \
            Casks/nettle.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/nettle.rb
          git diff --cached --quiet || git commit -m "nettle ${{ steps.sums.outputs.version }}"
          git push
