name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly re-scan so newly-published queries catch old code (Mon 07:00 UTC).
    - cron: '0 7 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required to upload results to the code-scanning dashboard.
      security-events: write
      # Only needed for workflows in private repos.
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # 'security-and-quality' adds maintainability/quality queries on top of
          # the default security suite.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
