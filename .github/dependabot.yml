version: 2
updates:
  # Frontend (pnpm — npm ecosystem, package.json at repo root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    open-pull-requests-limit: 10
    groups:
      # One PR for routine minor/patch bumps to keep the noise down; majors
      # still come as individual PRs so they get a proper look.
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # Rust backend (Cargo manifest lives in src-tauri)
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI / release / CodeQL workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    groups:
      actions:
        patterns:
          - '*'
